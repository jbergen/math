<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#4a90e2" />
  <title>Math Practice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">

    <section id="screen-start" class="screen active">
      <h1>Math Time! 🚀</h1>
      <p class="tagline">Add and subtract your way to the top!</p>
      <div id="last-session" class="last-session hidden"></div>
      <button id="btn-start" class="big-btn primary">Start</button>
      <button id="btn-worksheet" class="small-btn">Print worksheet</button>
    </section>

    <section id="screen-worksheet" class="screen">
      <h1>Print worksheet 🖨️</h1>
      <p class="tagline">Pick a level and how many problems.</p>

      <div class="ws-group">
        <div class="ws-label">Level</div>
        <div id="ws-levels" class="ws-choices" role="group" aria-label="Level"></div>
      </div>

      <div class="ws-group">
        <div class="ws-label">Problems</div>
        <div id="ws-counts" class="ws-choices" role="group" aria-label="Number of problems"></div>
      </div>

      <button id="btn-make-worksheet" class="big-btn primary">Make worksheet</button>
      <button id="btn-worksheet-back" class="small-btn">Back</button>
    </section>

    <section id="screen-print" class="screen">
      <div class="ws-controls no-print">
        <button id="btn-print" class="big-btn primary">Print</button>
        <button id="btn-print-back" class="small-btn">Back</button>
      </div>

      <div id="worksheet" class="worksheet">
        <header class="ws-header">
          <h2 id="ws-title">Math Worksheet</h2>
          <div class="ws-meta">
            <span>Name: <span class="ws-blank-line"></span></span>
            <span>Date: <span class="ws-blank-line"></span></span>
          </div>
        </header>
        <ol id="ws-problems" class="ws-problems"></ol>
      </div>
    </section>

    <section id="screen-play" class="screen">
      <header class="stats-bar">
        <div class="stat"><span class="stat-icon">⏱️</span><span id="stat-time">0:00</span></div>
        <div class="stat"><span class="stat-icon">✅</span><span id="stat-correct">0</span><span class="stat-sep">/</span><span id="stat-total">0</span></div>
        <div class="stat"><span class="stat-icon">🔥</span><span id="stat-streak">0</span></div>
        <div class="stat"><span class="stat-icon">⭐</span><span id="stat-level">1</span></div>
      </header>

      <div id="equation" class="equation" aria-live="polite"></div>
      <div id="feedback" class="feedback"></div>

      <div class="keypad" role="group" aria-label="Number keypad">
        <button class="key" data-key="7">7</button>
        <button class="key" data-key="8">8</button>
        <button class="key" data-key="9">9</button>
        <button class="key" data-key="4">4</button>
        <button class="key" data-key="5">5</button>
        <button class="key" data-key="6">6</button>
        <button class="key" data-key="1">1</button>
        <button class="key" data-key="2">2</button>
        <button class="key" data-key="3">3</button>
        <button class="key key-fn" data-key="back" aria-label="Backspace">⌫</button>
        <button class="key" data-key="0">0</button>
        <button class="key key-go" data-key="submit" aria-label="Submit">✓</button>
      </div>

      <button id="btn-done" class="small-btn">Done</button>
    </section>

    <section id="screen-end" class="screen">
      <h1 id="end-headline">Great session! 🌟</h1>
      <div id="end-badge" class="end-badge"></div>
      <button id="btn-again" class="big-btn primary">Play Again</button>
      <button id="btn-show-stats" class="small-btn">Show stats</button>
      <div id="end-stats" class="end-stats hidden">
        <div class="end-stat"><div class="end-stat-label">Time</div><div id="end-time" class="end-stat-value">0:00</div></div>
        <div class="end-stat"><div class="end-stat-label">Correct</div><div id="end-accuracy" class="end-stat-value">0%</div></div>
        <div class="end-stat"><div class="end-stat-label">Problems</div><div id="end-count" class="end-stat-value">0</div></div>
        <div class="end-stat"><div class="end-stat-label">Top Level</div><div id="end-level" class="end-stat-value">1</div></div>
      </div>
    </section>

    <div id="confetti" class="confetti" aria-hidden="true"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
